services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: joindevops07/catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb

  mongodb:
    build: ./mongodb 
    image: joindevops07/mongodb:v1
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  
  redis:
    image: redis:7
    container_name: redis
    volumes:
    - redis:/data

  mysql:
    build: ./mysql
    image: joindevops07/mysql:v1
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    volumes:
    - mongodb:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: robshop123

  user:
    build: ./user
    image: joindevops07/user:v1
    container_name: user
    depends_on:
    - mongodb
    - redis
    
  cart:
    build: ./cart
    image: joindevops07/cart:v1
    container_name: cart
    depends_on:
    - redis
    - catalogue

  shipping:
    build: ./shipping
    image: joindevops07/shipping:v1
    container_name: shipping
    depends_on:
    - cart 
    - mysql

  payment: 
    build: ./payment
    image: joindevops07/payment:v1
    container_name: payment
    depends_on: 
    - cart
    - user
    - rabbitmq

  frontend: 
    build: ./frontend
    image: joindevops07/frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - payment
    - shipping
  

networks:
  default:
    driver: bridge
    name: roboshop
    external: false    # true if the network is created manually using docker network command

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq: